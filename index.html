<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chikim PayAlert</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#25D366">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="PayAlert">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #25D366;
    --bg: #0f1a14;
    --card: #162118;
    --card2: #1c2b1f;
    --border: #2a3d2d;
    --text: #e8f5e9;
    --muted: #7a9e80;
    --accent: #4ade80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 0 0 48px;
  }
  header {
    background: linear-gradient(135deg, #0d3320, #1a4a28);
    padding: 26px 20px 20px; text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative; overflow: hidden;
  }
  header::before {
    content: ''; position: absolute; top: -40px; right: -40px;
    width: 140px; height: 140px; border-radius: 50%;
    background: rgba(37,211,102,0.1);
  }
  .logo { display: flex; align-items: center; justify-content: center; gap: 10px; position: relative; z-index:1; }
  .logo-icon {
    width: 42px; height: 42px;
    border-radius: 10px; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 12px rgba(37,211,102,0.3);
  }
  .logo-icon img { width: 100%; height: 100%; object-fit: cover; }
  h1 { font-family: 'Syne', sans-serif; font-size: 19px; font-weight: 800; color: #fff; }
  .subtitle { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 4px; position: relative; z-index:1; }

  .container { max-width: 480px; margin: 0 auto; padding: 0 16px; }

  .section-label {
    font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
    letter-spacing: 1.8px; text-transform: uppercase;
    color: var(--accent); margin: 22px 0 10px;
  }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px;
    display: flex; flex-direction: column; gap: 13px;
  }

  .field { display: flex; flex-direction: column; gap: 5px; }
  label { font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.9px; }

  input, select {
    background: var(--card2); border: 1.5px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    padding: 11px 13px; width: 100%; outline: none;
    transition: border-color 0.2s; -webkit-appearance: none;
  }
  input:focus, select:focus { border-color: var(--green); }
  input::placeholder { color: #3d5c42; }
  select option { background: #1c2b1f; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
  .row3 { display: grid; grid-template-columns: 100px 1fr; gap: 11px; }

  .preview-box {
    background: #0b1a0e; border: 1.5px solid var(--border);
    border-radius: 16px; padding: 16px; margin-top: 4px;
  }
  .preview-bubble {
    background: #1a3320; border-radius: 0 14px 14px 14px;
    padding: 14px 15px; font-size: 13px; line-height: 1.75;
    color: #d4edda; white-space: pre-wrap; word-break: break-word;
    border: 1px solid #2a4a2d;
  }
  .preview-bubble .empty { color: #3d5c42; font-style: italic; font-size: 13px; }
  .preview-footer { font-size: 10px; color: var(--muted); text-align: right; margin-top: 6px; }

  .badge {
    display: inline-block; background: rgba(37,211,102,0.15); color: var(--accent);
    font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px;
    letter-spacing: 0.4px; margin-left: 6px; vertical-align: middle;
  }

  .btn-send {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: var(--green); color: #0a1f0c;
    font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700;
    border: none; border-radius: 14px; padding: 15px;
    width: 100%; cursor: pointer; margin-top: 20px;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-send:active { transform: scale(0.98); }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-clear {
    display: block; text-align: center; background: transparent; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    border: 1px solid var(--border); border-radius: 10px;
    padding: 11px; width: 100%; cursor: pointer; margin-top: 10px;
    transition: color 0.2s, border-color 0.2s;
  }

  .tip { font-size: 12px; color: var(--muted); text-align: center; margin-top: 14px; line-height: 1.6; }
  .tip span { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"><img src="icon.png" alt="Chikim Logo"></div>
    <h1>Chikim PayAlert</h1>
  </div>
  <p class="subtitle">Chikim Enterprises Pvt. Ltd. — Payment Receipt Sender</p>
</header>

<div class="container">

  <div class="section-label">Customer Info</div>
  <div class="card">
    <div class="field">
      <label>Customer Name</label>
      <input type="text" id="custName" placeholder="e.g. Thangboi" oninput="updatePreview()">
    </div>
    <div class="field">
      <label>WhatsApp Phone Number</label>
      <input type="tel" id="phone" placeholder="e.g. 9876543210" oninput="updatePreview()">
    </div>
  </div>

  <div class="section-label">Payment Details</div>
  <div class="card">
    <div class="row2">
      <div class="field">
        <label>Amount (₹)</label>
        <input type="number" id="amount" placeholder="e.g. 2000" oninput="updatePreview()">
      </div>
      <div class="field">
        <label>Mode of Payment</label>
        <select id="payMode" onchange="updatePreview()">
          <option value="">-- Select --</option>
          <option value="Gpay">Gpay</option>
          <option value="Cash">Cash</option>
          <option value="Bank Transfer">Bank Transfer</option>
          <option value="PhonePe">PhonePe</option>
          <option value="NEFT/RTGS">NEFT/RTGS</option>
          <option value="Cheque">Cheque</option>
          <option value="UPI">UPI</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Date of Payment</label>
      <input type="date" id="payDate" oninput="updatePreview()">
    </div>

    <div class="field">
      <label>Agent</label>
      <div class="row3">
        <select id="agentTitle" onchange="updatePreview()">
          <option value="Sir">Sir</option>
          <option value="Mam">Mam</option>
          <option value="Miss">Miss</option>
        </select>
        <input type="text" id="agentName" placeholder="e.g. David" oninput="updatePreview()">
      </div>
    </div>

    <div class="field">
      <label>Plan / Program</label>
      <select id="plan" onchange="updatePreview()">
        <option value="">-- Select Plan --</option>
        <option value="MSM 5th phase">MSM 5th phase</option>
        <option value="CFF">CFF</option>
        <option value="CAP/CPM">CAP/CPM</option>
      </select>
    </div>

    <div class="field">
      <label>Month of Payment</label>
      <input type="text" id="months" placeholder="e.g. March 2026" oninput="updatePreview()">
    </div>
  </div>

  <div class="section-label">Message Preview <span class="badge">LIVE</span></div>
  <div class="preview-box">
    <div class="preview-bubble" id="previewBox">
      <span class="empty">Fill in the details above to preview the message...</span>
    </div>
    <div class="preview-footer">WhatsApp message preview</div>
  </div>

  <button class="btn-send" id="sendBtn" onclick="sendWhatsApp()" disabled>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
    Open in WhatsApp
  </button>

  <button class="btn-clear" onclick="clearForm()">Clear Form</button>

  <p class="tip">✅ Tap <span>Open in WhatsApp</span> — message is pre-filled.<br>Select the customer's contact and tap Send.</p>

</div>

<script>
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  document.getElementById('payDate').value = `${yyyy}-${mm}-${dd}`;

  function formatDate(val) {
    if (!val) return '';
    const [y, m, d] = val.split('-');
    return `${d}/${m}/${y}`;
  }

  function buildMessage() {
    const name       = document.getElementById('custName').value.trim();
    const amount     = document.getElementById('amount').value.trim();
    const payMode    = document.getElementById('payMode').value;
    const payDate    = document.getElementById('payDate').value;
    const agentTitle = document.getElementById('agentTitle').value;
    const agentName  = document.getElementById('agentName').value.trim();
    const plan       = document.getElementById('plan').value;
    const months     = document.getElementById('months').value.trim();

    if (!name || !amount || !payMode || !payDate || !agentName || !plan || !months) return null;

    const dateStr = formatDate(payDate);
    const amtFormatted = parseFloat(amount).toLocaleString('en-IN');

    return `Greetings from Chikim Enterprises Pvt. Ltd.

Dear ${name},

Your payment of ₹${amtFormatted}/- (${payMode}) was received on ${dateStr} from ${agentTitle} ${agentName} on account of ${plan} for the Month of ${months}

For more information please contact 📞 7085970615 / 7629959984

*Account details for online payment*

Name     : CHIKIM GROUP OFFICIAL
Ac. No.   : 50200063217009
IFSC No. : HDFC0002269
Gpay No. : +91 70058 00020

Ps: In order to avoid any hassle in recording and to receive a receipt, it is a *MUST* to send your online payment screenshot to this number.

Thank you
Chikim Customer Care.`;
  }

  function updatePreview() {
    const msg = buildMessage();
    const box = document.getElementById('previewBox');
    const btn = document.getElementById('sendBtn');
    if (!msg) {
      box.innerHTML = '<span class="empty">Fill in the details above to preview the message...</span>';
      btn.disabled = true;
    } else {
      box.textContent = msg;
      btn.disabled = false;
    }
  }

  function sendWhatsApp() {
    const msg = buildMessage();
    if (!msg) return;
    let phone = document.getElementById('phone').value.trim().replace(/\D/g, '');
    let waUrl;
    if (phone) {
      if (phone.startsWith('0')) phone = '91' + phone.substring(1);
      else if (!phone.startsWith('91')) phone = '91' + phone;
      waUrl = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
    } else {
      waUrl = `https://wa.me/?text=${encodeURIComponent(msg)}`;
    }
    window.open(waUrl, '_blank');
  }

  function clearForm() {
    ['custName','phone','amount','agentName','months'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('payMode').value = '';
    document.getElementById('agentTitle').value = 'Sir';
    document.getElementById('plan').value = '';
    document.getElementById('payDate').value = `${yyyy}-${mm}-${dd}`;
    updatePreview();
  }

  updatePreview();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
